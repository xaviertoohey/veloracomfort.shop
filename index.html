<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora Comfort - Premium Outdoor Hammock Chair</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Georgia', 'Garamond', serif; line-height: 1.7; color: #3d3d3d; background: #fdfbf8; }
        header { background: white; padding: 0.3rem 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 4px rgba(139, 101, 54, 0.08); border-bottom: 1px solid #ede7df; }
        header nav { max-width: 1400px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        header .logo { height: 70px; display: flex; align-items: center; }
        header .logo img { height: 100%; width: auto; }
        header a { color: #6b6b6b; text-decoration: none; margin-left: 2.5rem; font-size: 0.95rem; transition: color 0.3s; font-weight: 400; }
        header a:hover { color: #8b7345; }
        
        .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; max-width: 1400px; margin: 0 auto; padding: 5rem 2rem; background: linear-gradient(135deg, #fdfbf8 0%, #f5f0eb 100%); }
        .hero-image-container { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 15px 50px rgba(139, 101, 54, 0.15); }
        .carousel { position: relative; width: 100%; background: #f0f0f0; }
        .carousel-images { position: relative; width: 100%; overflow: hidden; }
        .carousel-image { width: 100%; height: auto; display: none; animation: fadeIn 0.5s; }
        .carousel-image.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .carousel-button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(139, 101, 54, 0.7); color: white; border: none; font-size: 1.5rem; padding: 1rem; cursor: pointer; z-index: 10; transition: background 0.3s; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .carousel-button:hover { background: rgba(139, 101, 54, 0.9); }
        .carousel-button.prev { left: 10px; }
        .carousel-button.next { right: 10px; }
        
        .carousel-dots { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 0.8rem; z-index: 10; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.5); cursor: pointer; transition: background 0.3s; border: 2px solid white; }
        .dot.active { background: rgba(139, 101, 54, 0.9); }
        
        .hero-content h2 { font-size: 2.8rem; margin-bottom: 1.5rem; color: #5a4a3a; line-height: 1.2; font-weight: 400; letter-spacing: -0.5px; }
        .hero-content p { font-size: 1.1rem; color: #5a5a5a; margin-bottom: 2rem; line-height: 1.9; font-weight: 400; }
        
        .price-section { margin: 2.5rem 0; }
        .price-tag { font-size: 2.2rem; color: #5a4a3a; font-weight: 400; margin-bottom: 0.5rem; }
        .price-tag .original { text-decoration: line-through; color: #999; font-size: 1.2rem; margin-right: 1rem; font-weight: 400; }
        
        .shipping-badge { display: inline-block; background: #d4c5a9; color: #5a4a3a; padding: 0.7rem 1.4rem; border-radius: 25px; font-size: 0.9rem; font-weight: 400; margin-bottom: 2rem; letter-spacing: 0.3px; border: 1px solid #c9b8a0; }
        
        .features-highlight { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin: 2.5rem 0; }
        .feature-item { font-size: 0.95rem; color: #555; padding-left: 1.8rem; position: relative; }
        .feature-item:before { content: "✓"; position: absolute; left: 0; color: #9b8b6f; font-weight: bold; font-size: 1.2rem; }
        
        .button-group { display: flex; gap: 1.5rem; margin-top: 3rem; }
        .btn { padding: 1rem 2.8rem; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; text-decoration: none; display: inline-block; font-weight: 400; letter-spacing: 0.3px; }
        .btn-primary { background: #8b7345; color: white; }
        .btn-primary:hover { background: #6b5a34; transform: translateY(-2px); }
        .btn-secondary { background: transparent; color: #8b7345; border: 1.5px solid #8b7345; }
        .btn-secondary:hover { background: #f5ede5; }
        
        .section { background: white; padding: 5rem 2rem; max-width: 1400px; margin: 0 auto; }
        .section-title { font-size: 2rem; color: #5a4a3a; margin-bottom: 1rem; text-align: center; font-weight: 400; letter-spacing: -0.3px; }
        .section-subtitle { text-align: center; color: #555; font-size: 1.05rem; margin-bottom: 3rem; max-width: 700px; margin-left: auto; margin-right: auto; line-height: 1.9; }
        
        .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; max-width: 1400px; margin: 0 auto 0; }
        .feature-card { background: #fdfbf8; padding: 2.5rem; text-align: center; border-radius: 8px; transition: transform 0.3s ease, box-shadow 0.3s ease; border: 1px solid #ede7df; }
        .feature-card:hover { transform: translateY(-5px); box-shadow: 0 10px 35px rgba(139, 101, 54, 0.1); }
        .feature-card h3 { color: #5a4a3a; margin-bottom: 1rem; font-size: 1.25rem; font-weight: 400; }
        .feature-card p { color: #666; line-height: 1.8; font-size: 0.95rem; }
        
        .lifestyle-hero { width: 100%; height: 500px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; position: relative; margin: 4rem 0; }
        .lifestyle-hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(90, 74, 58, 0.3); }
        .lifestyle-hero-content { position: relative; z-index: 2; text-align: center; color: white; }
        .lifestyle-hero h2 { font-size: 2.5rem; margin-bottom: 1rem; font-weight: 400; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .lifestyle-hero p { font-size: 1.1rem; font-weight: 300; text-shadow: 0 1px 5px rgba(0,0,0,0.3); max-width: 600px; line-height: 1.8; }
        
        .comparison-section { background: linear-gradient(135deg, #fdfbf8 0%, #f0e8de 100%); padding: 5rem 2rem; }
        .comparison-table { max-width: 1000px; margin: 0 auto; background: white; border: 1px solid #e0d5c8; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 25px rgba(139, 101, 54, 0.1); }
        .comparison-table table { width: 100%; border-collapse: collapse; }
        .comparison-table th { background: #8b7345; color: white; padding: 1.5rem; text-align: left; font-weight: 500; font-size: 0.95rem; letter-spacing: 0.5px; }
        .comparison-table td { padding: 1.2rem 1.5rem; border-bottom: 1px solid #ede7df; font-size: 0.95rem; color: #555; }
        .comparison-table tr:last-child td { border-bottom: none; }
        .comparison-table td:first-child { font-weight: 500; color: #5a4a3a; background: #fdfbf8; }
        .check-mark { color: #8b7345; font-weight: bold; font-size: 1.2rem; }
        
        .specs-section { background: white; padding: 5rem 2rem; }
        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2.5rem; max-width: 1400px; margin: 0 auto; }
        .spec-item { text-align: center; padding: 2rem; background: #fdfbf8; border-radius: 8px; border: 1px solid #ede7df; }
        .spec-item h4 { color: #8b7345; margin-bottom: 0.8rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 500; }
        .spec-item p { font-size: 1.6rem; font-weight: 400; color: #5a4a3a; }
        
        .credibility-section { background: linear-gradient(135deg, #fdfbf8 0%, #f0e8de 100%); padding: 5rem 2rem; }
        .credibility-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2.5rem; max-width: 1400px; margin: 0 auto; }
        .credibility-item { background: white; padding: 2.5rem; border-radius: 8px; border: 1px solid #e0d5c8; text-align: center; }
        .credibility-item h3 { color: #5a4a3a; margin-bottom: 1rem; font-size: 1.1rem; font-weight: 500; }
        .credibility-item p { color: #666; line-height: 1.8; font-size: 0.9rem; }
        
        .testimonials-section { background: white; padding: 5rem 2rem; }
        .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2.5rem; }
        .testimonial-card { background: #fdfbf8; padding: 2.5rem; border-radius: 8px; border: 1px solid #ede7df; transition: transform 0.3s ease; }
        .testimonial-card:hover { transform: translateY(-3px); }
        .stars { color: #9b8b6f; font-size: 0.9rem; margin-bottom: 1rem; letter-spacing: 3px; }
        .testimonial-text { color: #555; font-size: 0.95rem; line-height: 1.8; margin-bottom: 1.5rem; font-style: italic; }
        .testimonial-author { font-weight: 500; color: #5a4a3a; font-size: 0.95rem; }
        .testimonial-title { color: #888; font-size: 0.85rem; font-weight: 400; }
        
        footer { background: #5a4a3a; color: #f5f1ed; padding: 4rem 2rem 2rem; text-align: center; }
        footer .footer-logo { margin-bottom: 1.5rem; }
        footer .footer-logo img { height: 150px; width: auto; opacity: 0.9; }
        footer p { margin-bottom: 0.8rem; font-size: 0.95rem; }
        footer a { color: #d4c5a9; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        
        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; gap: 2rem; padding: 3rem 1.5rem; }
            .hero-content h2 { font-size: 1.8rem; }
            .button-group { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            header nav { flex-direction: column; gap: 1rem; }
            header a { margin-left: 0; }
            .features-highlight { grid-template-columns: 1fr; }
            .section-title { font-size: 1.6rem; }
            .comparison-table { font-size: 0.85rem; }
            .comparison-table td { padding: 0.8rem; }
            .carousel-button { width: 40px; height: 40px; font-size: 1.2rem; }
            .lifestyle-hero { height: 300px; }
            .lifestyle-hero h2 { font-size: 1.5rem; }
        }
    </style>
</head>
